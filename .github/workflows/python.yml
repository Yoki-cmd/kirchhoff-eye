name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install TeX and rasterization tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures \
            texlive-luatex \
            texlive-lang-chinese \
            texlive-lang-japanese \
            poppler-utils

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Pin minimum Pillow on Python 3.9
        if: matrix.python-version == '3.9'
        run: python -m pip install "Pillow==9.0.0"

      - name: Run tests
        run: python -m pytest tests -q

      - name: Compile Python sources
        run: python -m compileall src scripts tests

      - name: Check whitespace errors
        run: git diff --check
