name: TeX integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tex-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: TeX integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install TeX and rasterization tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures \
            texlive-luatex \
            texlive-lang-chinese \
            texlive-lang-japanese \
            poppler-utils

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile golden TeX
        run: python -m pytest tests/test_ir2tikz.py::test_golden_a_compiles -q

      - name: Render normal PNG
        run: python -m pytest tests/test_render_compare_crop.py::test_render_ok -q

      - name: Render automatic debug PNG
        run: python -m pytest tests/test_render_compare_crop.py::test_render_also_renders_matching_debug_tex -q

      - name: Verify exact label coordinates
        run: python -m pytest tests/test_ir2tikz.py::test_component_label_at_uses_exact_human_selected_coordinate -q

      - name: Run pipeline smoke test
        run: python -m pytest tests/test_pipeline_cli.py::test_build_valid_ir_without_source_creates_complete_artifacts -q

      - name: Run review workflow integration
        run: python -m pytest tests/test_review_workflow.py -q

      - name: Run perception seed-IR render regression
        run: python -m pytest tests/test_perception_pipeline.py::test_seed_ir_is_hash_bound_and_enters_standard_eye_review_job_when_no_blocker -q

      - name: Run concurrent review render regression
        run: python -m pytest tests/test_pipeline_concurrency.py::test_concurrent_reviews_serialize_to_one_immutable_winner -q

      - name: Run synthetic fixture integration
        run: python -m pytest tests/test_synthetic_e2e.py -q -n auto

      - name: Compile CJK text with LuaLaTeX
        run: python -m pytest tests/test_ir2tikz.py::test_cjk_text_compiles_with_lualatex -q
