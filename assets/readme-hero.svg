<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">Kirchhoff-eye</title>
  <desc id="desc">Topology-aware circuit redraws from reviewed JSON IR to validated circuitikz and debug renders.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94A3B8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1440" height="560" rx="28" fill="url(#bg)"/>
  <rect width="1440" height="560" rx="28" fill="url(#grid)"/>
  <circle cx="1080" cy="260" r="350" fill="url(#glow)"/>

  <!-- decorative circuit traces -->
  <g fill="none" stroke="url(#accent)" stroke-opacity="0.34" stroke-width="2">
    <path d="M0 104H78V64H176"/>
    <path d="M0 448H96V492H220"/>
    <path d="M1260 0V48H1368V116H1440"/>
    <path d="M1210 560V512H1332V468H1440"/>
  </g>
  <g fill="#5EEAD4">
    <circle cx="78" cy="104" r="4"/><circle cx="176" cy="64" r="4"/>
    <circle cx="96" cy="448" r="4"/><circle cx="220" cy="492" r="4"/>
  </g>
  <g fill="#A78BFA">
    <circle cx="1368" cy="48" r="4"/><circle cx="1332" cy="512" r="4"/>
  </g>

  <!-- logo -->
  <g transform="translate(94 86)">
    <path d="M0 50C30 10 68 0 106 0s76 10 106 50c-30 40-68 50-106 50S30 90 0 50Z" fill="#0F172A" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="106" cy="50" r="27" fill="none" stroke="#E2E8F0" stroke-width="4"/>
    <circle cx="106" cy="50" r="9" fill="#5EEAD4" filter="url(#softGlow)"/>
    <path d="M26 50H60M152 50h34M106 14V0M106 100v-14" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="50" r="4" fill="#38BDF8"/>
    <circle cx="152" cy="50" r="4" fill="#38BDF8"/>
  </g>

  <!-- title block -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="94" y="242" fill="#F8FAFC" font-size="70" font-weight="760" letter-spacing="-2.2">Kirchhoff-eye</text>
    <rect x="95" y="264" width="360" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="95" y="320" fill="#CBD5E1" font-size="25" font-weight="450">Topology-aware circuit redraws.</text>
    <text x="95" y="357" fill="#94A3B8" font-size="20">Reviewed JSON IR → validated circuitikz → reproducible artifacts</text>

    <g transform="translate(95 405)" font-size="14" font-weight="650" letter-spacing="0.6">
      <g><rect width="116" height="38" rx="19" fill="#102A2B" stroke="#2DD4BF" stroke-opacity="0.55"/><text x="58" y="24" text-anchor="middle" fill="#99F6E4">VALIDATE</text></g>
      <g transform="translate(130)"><rect width="105" height="38" rx="19" fill="#0D2238" stroke="#38BDF8" stroke-opacity="0.55"/><text x="52.5" y="24" text-anchor="middle" fill="#BAE6FD">RENDER</text></g>
      <g transform="translate(249)"><rect width="110" height="38" rx="19" fill="#21183B" stroke="#A78BFA" stroke-opacity="0.55"/><text x="55" y="24" text-anchor="middle" fill="#DDD6FE">COMPARE</text></g>
      <g transform="translate(373)"><rect width="105" height="38" rx="19" fill="#2B1B29" stroke="#F472B6" stroke-opacity="0.55"/><text x="52.5" y="24" text-anchor="middle" fill="#FBCFE8">REVIEW</text></g>
    </g>
  </g>

  <!-- circuit panel -->
  <g transform="translate(808 66)" filter="url(#panelShadow)">
    <rect width="538" height="426" rx="24" fill="#0B1220" stroke="#334155" stroke-width="1.5"/>
    <rect x="1" y="1" width="536" height="54" rx="23" fill="#111827"/>
    <circle cx="28" cy="28" r="5" fill="#FB7185"/><circle cx="46" cy="28" r="5" fill="#FBBF24"/><circle cx="64" cy="28" r="5" fill="#34D399"/>
    <text x="96" y="34" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">circuit.ir.json → circuit.tex</text>

    <g transform="translate(42 88)" fill="none" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <!-- top and bottom rails -->
      <path d="M72 42H196M196 42H350M72 260H350"/>
      <!-- voltage source -->
      <path d="M72 42V94M72 178V260"/>
      <circle cx="72" cy="136" r="42"/>
      <path d="M62 119H82M72 109V129M62 155H82" stroke="#5EEAD4"/>
      <!-- resistor -->
      <path d="M196 42V74l-15 12 30 18-30 18 30 18-15 12v30"/>
      <!-- lower resistor -->
      <path d="M196 182v20l-15 12 30 18-30 18 15 10"/>
      <!-- capacitor branch -->
      <path d="M294 182V202M270 202H318M270 220H318M294 220V260"/>
      <!-- output -->
      <path d="M196 182H426"/>
      <circle cx="426" cy="182" r="7" fill="#0B1220"/>
      <!-- ground -->
      <path d="M294 260v20M270 280h48M278 291h32M286 302h16"/>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <text x="81" y="223" fill="#94A3B8">V1</text>
      <text x="256" y="142" fill="#94A3B8">R1</text>
      <text x="256" y="326" fill="#94A3B8">R2</text>
      <text x="374" y="250" fill="#94A3B8">C1</text>
      <text x="450" y="279" fill="#5EEAD4">u_out</text>
    </g>

    <g>
      <circle cx="238" cy="270" r="6" fill="#38BDF8" filter="url(#softGlow)"/>
      <circle cx="336" cy="154" r="6" fill="#38BDF8" filter="url(#softGlow)"/>
      <path d="M238 270H336" stroke="#38BDF8" stroke-width="3"/>
    </g>

    <g transform="translate(26 380)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">
      <circle cx="8" cy="0" r="5" fill="#34D399"/>
      <text x="22" y="4" fill="#A7F3D0">topology valid</text>
      <circle cx="158" cy="0" r="5" fill="#38BDF8"/>
      <text x="172" y="4" fill="#BAE6FD">debug grid ready</text>
      <circle cx="344" cy="0" r="5" fill="#A78BFA"/>
      <text x="358" y="4" fill="#DDD6FE">deterministic output</text>
    </g>
  </g>
</svg>
